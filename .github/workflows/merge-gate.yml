name: Merge Gate

# main への PR ごとに完全 CI を実行する。集約ジョブ "Merge Gate Result" だけを
# Required Status Check に設定することで、サブジョブが skip しても required が
# pending デッドロックせず、将来ジョブを増やしても required 名が安定する。
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: "検証対象の ref（ブランチ / タグ / SHA）"

concurrency:
  group: merge-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full:
    name: Full CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
      - name: wrangler デプロイ設定の検証（dry-run・認証不要）
        run: pnpm exec wrangler deploy --dry-run

  gate:
    name: Merge Gate Result
    needs: [full]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 集約結果の判定（fail-closed）
        env:
          RESULT: ${{ needs.full.result }}
        run: |
          # full は意図的に if: 条件を持たず skip 不可。skipped を許容するのは
          # 将来ジョブを増やした際に required が pending デッドロックしないため。
          # full に if: を足す場合はこの許容を必ず見直すこと。
          echo "full job result: ${RESULT}"
          case "${RESULT}" in
            success|skipped) echo "merge gate passed" ;;
            *) echo "::error::full ジョブの結果 '${RESULT}' は許容されない"; exit 1 ;;
          esac
