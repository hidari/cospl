name: Merge Gate

# main への PR ごとに完全 CI を実行する。集約ジョブ "Merge Gate Result" だけを
# Required Status Check に設定することで、サブジョブが skip しても required が
# pending デッドロックせず、将来ジョブを増やしても required 名が安定する。
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: "検証対象の ref（ブランチ / タグ / SHA）"

concurrency:
  group: merge-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full:
    name: Full CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
      - name: wrangler デプロイ設定の検証（dry-run・認証不要）
        run: pnpm exec wrangler deploy --dry-run

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps
      - run: pnpm e2e

  gate:
    name: Merge Gate Result
    needs: [full, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 集約結果の判定（fail-closed）
        env:
          FULL: ${{ needs.full.result }}
          E2E: ${{ needs.e2e.result }}
        run: |
          # full / e2e はいずれも skip 不可。skipped 許容は将来ジョブ追加時の
          # required pending デッドロック回避のためで、両者の success を要求する。
          echo "full job result: ${FULL}"
          echo "e2e job result: ${E2E}"
          for result in "${FULL}" "${E2E}"; do
            case "${result}" in
              success|skipped) ;;
              *) echo "::error::ジョブ結果 '${result}' は許容されない"; exit 1 ;;
            esac
          done
          echo "merge gate passed"
