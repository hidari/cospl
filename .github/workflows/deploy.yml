name: Deploy

# cospl.org への本番デプロイ。手動トリガーのみ（deploy スキルが gh workflow run で起動）。
# ローカルからの wrangler deploy は禁止のため、デプロイ経路はこの workflow に一本化する。
on:
  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: "デプロイ対象の ref（既定: main）"
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare (cospl.org)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://cospl.org
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || 'main' }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build & deploy
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Health check
        run: |
          # 静的アセット配信・Worker ロジック・エージェント発見性ルートを確認する。
          # いずれもデプロイ直後のエッジ伝播待ちでフレークしうるためリトライする。
          # リダイレクト時に挙動が割れないよう全 curl で -L を付ける。
          check_200() {
            for i in $(seq 1 10); do
              code=$(curl -fsSL -o /dev/null -w "%{http_code}" "$1" || true)
              echo "  ${1} attempt ${i}: HTTP ${code}"
              [ "${code}" = "200" ] && return 0
              sleep 10
            done
            return 1
          }
          check_200 "https://cospl.org/" || { echo "::error::health check failed: / did not return 200"; exit 1; }
          check_200 "https://cospl.org/license.md" || { echo "::error::health check failed: /license.md did not return 200"; exit 1; }
          check_200 "https://cospl.org/robots.txt" || { echo "::error::health check failed: /robots.txt did not return 200"; exit 1; }
          check_200 "https://cospl.org/sitemap.xml" || { echo "::error::health check failed: /sitemap.xml did not return 200"; exit 1; }
          check_200 "https://cospl.org/.well-known/api-catalog" || { echo "::error::health check failed: /.well-known/api-catalog did not return 200"; exit 1; }
          check_200 "https://cospl.org/openapi.json" || { echo "::error::health check failed: /openapi.json did not return 200"; exit 1; }
          check_200 "https://cospl.org/llms.txt" || { echo "::error::health check failed: /llms.txt did not return 200"; exit 1; }
          check_200 "https://cospl.org/manifest.webmanifest" || { echo "::error::health check failed: /manifest.webmanifest did not return 200"; exit 1; }
          check_200 "https://cospl.org/sw.js" || { echo "::error::health check failed: /sw.js did not return 200"; exit 1; }

          # robots.txt に Content Signals が宣言されていることを確認する。
          robots=$(curl -fsSL "https://cospl.org/robots.txt" || true)
          echo "${robots}" | grep -qi "^Content-Signal:" || { echo "::error::health check failed: robots.txt に Content-Signal が無い"; exit 1; }

          # Worker が / を処理していることの検証（run_worker_first から / が漏れる回帰の防止）。
          # 静的 index.html が直接配信されると Link ヘッダ付与と Markdown ネゴシエーションが効かなくなる。
          check_link_header() {
            for i in $(seq 1 5); do
              link=$(curl -fsSL -D - -o /dev/null "https://cospl.org/" | grep -i "^link:" || true)
              echo "  / link header attempt ${i}: ${link}"
              echo "${link}" | grep -qi 'rel="alternate"' && return 0
              sleep 10
            done
            return 1
          }
          check_link_header || { echo "::error::health check failed: / に Link ヘッダが無い（run_worker_first に / があるか確認）"; exit 1; }

          check_markdown() {
            for i in $(seq 1 5); do
              ctype=$(curl -fsSL -H "Accept: text/markdown" -o /dev/null -w "%{content_type}" "https://cospl.org/" || true)
              echo "  / markdown negotiation attempt ${i}: ${ctype}"
              echo "${ctype}" | grep -qi "text/markdown" && return 0
              sleep 10
            done
            return 1
          }
          check_markdown || { echo "::error::health check failed: Accept: text/markdown が Markdown を返さない"; exit 1; }

          # /llms.txt が Worker 経由で text/markdown + CORS を返すことの検証（run_worker_first から
          # /llms.txt が漏れる回帰の防止）。静的アセットが直接配信されると text/plain・CORS 無しになり、
          # api-catalog の広告（service-doc: text/markdown）と乖離する。これは統合テストでは検出できない。
          check_llms() {
            for i in $(seq 1 5); do
              headers=$(curl -fsSL -D - -o /dev/null "https://cospl.org/llms.txt" || true)
              ctype=$(echo "${headers}" | grep -i "^content-type:" || true)
              acao=$(echo "${headers}" | grep -i "^access-control-allow-origin:" || true)
              echo "  /llms.txt attempt ${i}: ${ctype} ${acao}"
              echo "${ctype}" | grep -qi "text/markdown" && echo "${acao}" | grep -q '\*' && return 0
              sleep 10
            done
            return 1
          }
          check_llms || { echo "::error::health check failed: /llms.txt が text/markdown + CORS を返さない（run_worker_first に /llms.txt があるか確認）"; exit 1; }

          # manifest が application/manifest+json で配信されることを確認する。
          check_manifest() {
            for i in $(seq 1 5); do
              ctype=$(curl -fsSL -o /dev/null -w "%{content_type}" "https://cospl.org/manifest.webmanifest" || true)
              echo "  /manifest.webmanifest attempt ${i}: ${ctype}"
              echo "${ctype}" | grep -qi "application/manifest+json" && return 0
              sleep 10
            done
            return 1
          }
          check_manifest || { echo "::error::health check failed: /manifest.webmanifest が application/manifest+json を返さない"; exit 1; }

          # sw.js が JavaScript の Content-Type で配信されることを確認する。
          # Service Worker は MIME タイプが JavaScript 以外だと登録が静かに失敗するため検証する。
          check_sw_ctype() {
            for i in $(seq 1 5); do
              ctype=$(curl -fsSL -o /dev/null -w "%{content_type}" "https://cospl.org/sw.js" || true)
              echo "  /sw.js attempt ${i}: ${ctype}"
              echo "${ctype}" | grep -qi "javascript" && return 0
              sleep 10
            done
            return 1
          }
          check_sw_ctype || { echo "::error::health check failed: /sw.js が JavaScript の Content-Type を返さない（Service Worker 登録が失敗する）"; exit 1; }

          # 本番 / の CSP に厳格ディレクティブ（upgrade-insecure-requests）が載ることを検証する。
          # CSP は worker(htmlHomeResponse) が付与する worker-routed 挙動で、統合テストでは検出できない。
          check_csp() {
            for i in $(seq 1 5); do
              csp=$(curl -fsSL -D - -o /dev/null "https://cospl.org/" | grep -i "^content-security-policy:" || true)
              echo "  / csp attempt ${i}: ${csp}"
              echo "${csp}" | grep -qi "upgrade-insecure-requests" && echo "${csp}" | grep -qi "default-src 'self'" && echo "${csp}" | grep -qi "worker-src 'self'" && echo "${csp}" | grep -qi "manifest-src 'self'" && return 0
              sleep 10
            done
            return 1
          }
          check_csp || { echo "::error::health check failed: / の CSP に upgrade-insecure-requests / default-src / worker-src / manifest-src が無い"; exit 1; }
          echo "healthy"
