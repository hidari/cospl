name: Deploy

# cospl.org への本番デプロイ。手動トリガーのみ（deploy スキルが gh workflow run で起動）。
# ローカルからの wrangler deploy は禁止のため、デプロイ経路はこの workflow に一本化する。
on:
  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: "デプロイ対象の ref（既定: main）"
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare (cospl.org)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://cospl.org
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || 'main' }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build & deploy
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Health check
        run: |
          # 静的アセットの配信（/）と Worker ロジック（/license.md）の両方を確認する。
          check() {
            for i in $(seq 1 10); do
              code=$(curl -fsS -o /dev/null -w "%{http_code}" "$1" || true)
              echo "  ${1} attempt ${i}: HTTP ${code}"
              [ "${code}" = "200" ] && return 0
              sleep 10
            done
            return 1
          }
          check "https://cospl.org/" || { echo "::error::health check failed: cospl.org/ did not return 200"; exit 1; }
          check "https://cospl.org/license.md" || { echo "::error::health check failed: cospl.org/license.md did not return 200"; exit 1; }
          echo "healthy"
