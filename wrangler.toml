name = "cospl"
main = "./src/worker.ts"
compatibility_date = "2026-06-15"

# 静的アセット。directory は @cloudflare/vite-plugin が Vite ビルド出力から自動設定するため指定しない。
# run_worker_first で /license.md（GET/OPTIONS）を Worker に強制ルーティングし、それ以外は assets-first。
[assets]
binding = "ASSETS"
run_worker_first = ["/license.md"]

[observability]
enabled = true

# カスタムドメイン cospl.org。デプロイ時に Cloudflare がゾーン/証明書を割り当てる。
# （ダッシュボードで設定する場合はこのブロックを削除してよい）
[[routes]]
pattern = "cospl.org"
custom_domain = true
