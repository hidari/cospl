name = "cospl"
main = "./src/worker.ts"
compatibility_date = "2026-06-15"

# 静的アセット。directory は @cloudflare/vite-plugin が Vite ビルド出力から自動設定するため指定しない。
# run_worker_first で Worker 処理ルートを強制ルーティングする。特に / は実体の index.html が
# あるため、明示しないと Worker を経由せず直接配信され、Link ヘッダ付与と Markdown ネゴシエーションが効かない。
# robots.txt / sitemap.xml は実体が無く、列挙しなくてもアセットミスで Worker に届く。
# ここでの列挙は挙動を変えず、Worker 処理ルートであることを示すドキュメント目的。
[assets]
binding = "ASSETS"
run_worker_first = ["/license.md", "/", "/robots.txt", "/sitemap.xml", "/.well-known/api-catalog", "/openapi.json"]

[observability]
enabled = true

# 自動トレーシング。各 invocation を OpenTelemetry 準拠の span（waterfall）で可視化する。
# early beta 中は observability.enabled だけでは自動有効化されないため明示指定が必要。
# head_sampling_rate は 0〜1（取得割合）。span は Workers Logs と同じクォータを消費するため、
# 低トラフィックの今は 1.0（全件取得）にし、トラフィックが増えたら下げる。
[observability.traces]
enabled = true
head_sampling_rate = 1.0

# カスタムドメイン cospl.org。デプロイ時に Cloudflare がゾーン/証明書を割り当てる。
# （ダッシュボードで設定する場合はこのブロックを削除してよい）
[[routes]]
pattern = "cospl.org"
custom_domain = true
